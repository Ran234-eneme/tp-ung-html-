<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - NovaTech</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <h1>NovaTech Solutions</h1>
    <nav>
      <ul>
        <li><a href="index.html">Accueil</a></li>
        <li><a href="about.html">À propos</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main class="content">
    <h2>Contactez-nous</h2>
    <p>Remplissez le formulaire ci-dessous, nous vous répondrons rapidement.</p>

    <form action="#" method="post">
      <label for="nom">Nom complet</label>
      <input type="text" id="nom" name="nom" required>

      <label for="email">Adresse e-mail</label>
      <input type="email" id="email" name="email" required>

      <label for="telephone">Téléphone</label>
      <input type="tel" id="telephone" name="telephone">

      <label for="sujet">Sujet</label>
      <select id="sujet" name="sujet" required>
        <option value="">-- Choisir --</option>
        <option value="devis">Demande de devis</option>
        <option value="support">Support</option>
        <option value="autre">Autre</option>
      </select>

      <label for="message">Message</label>
      <textarea id="message" name="message" rows="5" required></textarea>

      <label>
        <input type="checkbox" name="accepte">
        J'accepte d'être contacté(e)
      </label>

      <button type="submit">Envoyer</button>
    </form>
  </main>

  <footer>
    <p>&copy; 2026 NovaTech Solutions</p>
  </footer>

</body>
</html>
